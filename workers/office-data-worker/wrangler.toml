name = "office-data-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGINS = "https://multiversestudios.xyz,http://localhost:3000,http://localhost:3001"

# Secrets (set via `wrangler secret put`):
#   OFFICE_UPDATE_SECRET — shared secret for the local publisher to authenticate POST requests
#                          e.g.: wrangler secret put OFFICE_UPDATE_SECRET

# KV namespace — stores the latest sanitized office data snapshot
# Create with: wrangler kv namespace create OFFICE_DATA
# Then paste the returned id below.
[[kv_namespaces]]
binding = "OFFICE_DATA"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Routes: intercept /api/office/* on the live domain before it reaches the static host.
# Requires the domain to be proxied through Cloudflare (orange cloud ON in DNS).
[[routes]]
pattern = "multiversestudios.xyz/api/office/*"
zone_name = "multiversestudios.xyz"
