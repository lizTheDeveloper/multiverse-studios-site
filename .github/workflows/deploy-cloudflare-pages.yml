name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=multiverse-studios-site

      - name: Verify deployment
        run: |
          SITE_URL="https://multiversestudios.xyz"
          echo "Waiting 30s for edge propagation..."
          sleep 30

          FAILED=0
          for PAGE in "/" "/mvee.html" "/about.html" "/press.html" "/nevereverland.html" "/cultures-of-the-belt/" "/playtest.html" "/community.html"; do
            URL="${SITE_URL}${PAGE}"
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$URL")
            if [ "$STATUS" -eq 200 ]; then
              echo "OK  $URL ($STATUS)"
            else
              echo "FAIL $URL ($STATUS)"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more pages failed verification"
            exit 1
          fi

      - name: Post result to Paperclip (if issue ID in commit message)
        if: always()
        env:
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          set +e
          ISSUE_ID=$(printf '%s' "$COMMIT_MSG" | grep -oE 'MUL-[0-9]+' | head -1)

          if [ -z "$ISSUE_ID" ] || [ -z "$PAPERCLIP_API_URL" ] || [ -z "$PAPERCLIP_API_KEY" ]; then
            echo "No issue ID in commit or Paperclip not configured — skipping"
            exit 0
          fi

          ISSUE_DATA=$(curl -sf -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            "$PAPERCLIP_API_URL/api/companies/ea3250e1-8c60-4100-800f-1da907107373/issues?q=$ISSUE_ID")

          ISSUE_UUID=$(printf '%s' "$ISSUE_DATA" | python3 -c "import sys,json; d=json.loads(sys.stdin.read()); print(d[0]['id'] if d else '')" 2>/dev/null)

          if [ -z "$ISSUE_UUID" ]; then
            echo "Could not resolve $ISSUE_ID — skipping"
            exit 0
          fi

          BODY="Cloudflare Pages deploy complete — preview: ${DEPLOY_URL:-n/a}. Commit ${{ github.sha }}."
          curl -sf -X POST \
            -H "Authorization: Bearer $PAPERCLIP_API_KEY" \
            -H "Content-Type: application/json" \
            "$PAPERCLIP_API_URL/api/issues/$ISSUE_UUID/comments" \
            -d "{\"body\": \"$BODY\"}" || echo "Failed to post comment — non-fatal"
