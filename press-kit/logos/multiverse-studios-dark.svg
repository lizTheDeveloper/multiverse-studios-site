<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" width="360" height="80" role="img" aria-label="Multiverse Studios">
  <defs>
    <linearGradient id="r1-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffc8"/>
      <stop offset="100%" stop-color="#0a8f6f"/>
    </linearGradient>
    <linearGradient id="r2-d" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7b68ee"/>
      <stop offset="100%" stop-color="#4a2fb8"/>
    </linearGradient>
    <linearGradient id="r3-d" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
    <filter id="glow-d">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Mark: three interlocking rings -->
  <g transform="translate(8, 8) scale(0.65)">
    <ellipse cx="42" cy="44" rx="28" ry="32" fill="none" stroke="url(#r1-d)" stroke-width="4" transform="rotate(-20 42 44)" filter="url(#glow-d)" opacity="0.9"/>
    <ellipse cx="56" cy="46" rx="28" ry="32" fill="none" stroke="url(#r2-d)" stroke-width="4" transform="rotate(25 56 46)" filter="url(#glow-d)" opacity="0.85"/>
    <ellipse cx="50" cy="52" rx="26" ry="30" fill="none" stroke="url(#r3-d)" stroke-width="3.5" transform="rotate(5 50 52)" filter="url(#glow-d)" opacity="0.75"/>
    <circle cx="50" cy="48" r="4" fill="#ffffff" opacity="0.95"/>
    <circle cx="50" cy="48" r="7" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="82" y="34" font-family="'Syne', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="22" fill="#e8e6f0" letter-spacing="1.5">MULTIVERSE</text>
  <text x="83" y="56" font-family="'JetBrains Mono', 'Courier New', monospace" font-weight="400" font-size="13" fill="#8a8694" letter-spacing="3.5">STUDIOS</text>
</svg>
