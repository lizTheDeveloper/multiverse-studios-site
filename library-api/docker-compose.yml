services:
  library-api:
    build: .
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    env_file: .env
    networks:
      - coolify
    labels:
      # Traefik — path-based routing so no new DNS record is needed.
      # Incoming:  https://api.multiversestudios.xyz/library/*
      #            https://api.multiversestudios.xyz/auth/*
      - traefik.enable=true
      - traefik.http.routers.library-api.rule=Host(`api.multiversestudios.xyz`) && (PathPrefix(`/library`) || PathPrefix(`/auth`))
      - traefik.http.routers.library-api.entrypoints=https
      - traefik.http.routers.library-api.tls=true
      - traefik.http.routers.library-api.tls.certresolver=letsencrypt
      - traefik.http.services.library-api.loadbalancer.server.port=4000

networks:
  coolify:
    external: true
